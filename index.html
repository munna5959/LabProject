<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Smart Calculator</h1>

  <div class="mode-switch">
    <button onclick="setMode('normal')">Normal</button>
    <button onclick="setMode('matrix')">Matrix</button>
  </div>

  <div id="normalCalc" class="mode">
    <input id="display" readonly>
  </div>

  <div id="matrixCalc" class="mode hidden">
    <div class="matrix-box">
      <textarea id="matrixA" placeholder="Matrix A"></textarea>
      <textarea id="matrixB" placeholder="Matrix B"></textarea>
    </div>

    <div class="matrix-actions">
      <button onclick="calculate('add')">A+B</button>
      <button onclick="calculate('sub')">A-B</button>
      <button onclick="calculate('mul')">A×B</button>
      <button onclick="transpose() ">Trans</button>
      <button onclick="determinant()">Det</button>
    </div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="press(' ')">␣</button>
    <button onclick="press('+')">+</button>

    <button onclick="newRow()">↵ Row</button>
    <button onclick="clearAll()">C</button>
    <button onclick="backspace()">⌫</button>
    <button onclick="calculateNormal()">=</button>
  </div>

  <pre id="result"></pre>
</div>

<script src="script.js"></script>
</body>
</html>
